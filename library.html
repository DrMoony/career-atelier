<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>템플릿 라이브러리 · Career Atelier</title>
<style>
:root{
  --bg:#0A0E0F;--bg2:#0F1416;--panel:#141B1D;--panel2:#1A2325;
  --line:#26312F;--ink:#ECEFEC;--ink2:#AAB4B1;--ink3:#6E7C79;
  --gold:#C9A96A;--gold2:#A8823E;--teal:#57B7C1;
  --fam-gallery:#C9A96A;--fam-noir:#8E9BFF;--fam-editorial:#E8A87C;
  --fam-studio:#F06B9A;--fam-neotech:#57B7C1;--fam-warm:#E0A06B;
  --fam-lens:#9BD1A0;--fam-corporate:#7FA8D8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Outfit','Pretendard',system-ui,-apple-system,'Apple SD Gothic Neo',sans-serif;
  word-break:keep-all;overflow-wrap:break-word;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{max-width:1240px;margin:0 auto;padding:0 22px}

/* header */
header{border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0C1113,var(--bg));position:sticky;top:0;z-index:20;backdrop-filter:blur(8px)}
.hrow{display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:20px 0 16px}
.brand{font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:600}
.h1{font-family:'Fraunces',Georgia,serif;font-size:26px;font-weight:500;letter-spacing:-.01em}
.sub{color:var(--ink2);font-size:13.5px;margin-top:3px}
.count{color:var(--ink3);font-size:13px;white-space:nowrap}
.count b{color:var(--gold);font-weight:600}

/* controls */
.controls{padding:14px 0 4px;position:sticky;top:0;z-index:15}
.fams{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chip{border:1px solid var(--line);background:var(--panel);color:var(--ink2);font-size:13px;
  padding:7px 13px;border-radius:100px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px;font-family:inherit}
.chip:hover{border-color:var(--gold2);color:var(--ink)}
.chip.on{background:var(--gold);border-color:var(--gold);color:#100C05;font-weight:600}
.chip .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.85}
.chip .n{opacity:.6;font-size:11.5px}
.chip.on .n{opacity:.75}
.row2{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:100px;overflow:hidden}
.seg button{background:transparent;border:0;color:var(--ink2);font-size:12.5px;padding:7px 14px;cursor:pointer;font-family:inherit}
.seg button.on{background:var(--panel2);color:var(--ink)}
.search{flex:1;min-width:180px;background:var(--panel);border:1px solid var(--line);border-radius:100px;
  color:var(--ink);font-size:13.5px;padding:8px 15px;font-family:inherit}
.search::placeholder{color:var(--ink3)}
.search:focus{outline:none;border-color:var(--gold2)}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:22px 0 60px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;
  display:flex;flex-direction:column;transition:.18s}
.card:hover{border-color:var(--gold2);transform:translateY(-2px)}
.shot{display:block;width:100%;aspect-ratio:640/430;object-fit:cover;object-position:top;background:var(--panel2);border-bottom:1px solid var(--line)}
.card:hover .shot{opacity:.92}
.pal{display:flex;height:96px}
.card.has-shot .pal{height:26px}
.pal span{flex:1;transition:flex .2s}
.pal span:hover{flex:1.6}
.cbody{padding:14px 15px 15px}
.ctop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.name{font-size:15px;font-weight:600;letter-spacing:-.01em;text-transform:capitalize}
.fam{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:6px;
  font-weight:600;white-space:nowrap;border:1px solid;background:transparent}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin:9px 0 2px}
.tag{font-size:11.5px;color:var(--ink2);background:var(--bg2);border:1px solid var(--line);padding:3px 8px;border-radius:6px}
.tag.bg-dark{color:#C9B78A;border-color:#3a3320}
.tag.bg-light{color:#9BD1A0}
.vibe{color:var(--ink2);font-size:12.5px;margin-top:9px;font-style:italic}
.layout{color:var(--ink3);font-size:11.5px;margin-top:5px}
.cfoot{margin-top:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.demo{font-size:12px;color:var(--gold);border:1px solid var(--gold2);border-radius:8px;padding:6px 12px;cursor:pointer;transition:.15s}
.demo:hover{background:var(--gold);color:#100C05}
.demo.off{color:var(--ink3);border-color:var(--line);cursor:default}
.demo.off:hover{background:transparent;color:var(--ink3)}
.conf{font-size:10.5px;color:var(--ink3);display:inline-flex;align-items:center;gap:5px}
.conf i{width:7px;height:7px;border-radius:50%;display:inline-block}
.conf.high i{background:#6fbf7f}.conf.med i{background:var(--gold)}.conf.low i{background:#c96a6a}
.empty{grid-column:1/-1;text-align:center;color:var(--ink3);padding:60px 0}
.note{color:var(--ink3);font-size:12px;padding:0 0 40px;line-height:1.7}
.note a{color:var(--gold)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--gold);color:#100C05;
  font-size:13px;font-weight:600;padding:9px 18px;border-radius:100px;opacity:0;transition:.2s;pointer-events:none;z-index:40}
.toast.show{opacity:1}
@media(max-width:560px){.grid{grid-template-columns:1fr}.h1{font-size:22px}}
</style>

<header><div class="wrap">
  <div class="hrow">
    <div>
      <div class="brand">Career Atelier · Library</div>
      <div class="h1">템플릿 라이브러리</div>
      <div class="sub">라이브러리 <b style="color:var(--ink)">115개</b>를 실제 CSS·HTML 코드로 실측해 분류했어요. 팔레트는 각 템플릿의 진짜 색이에요.</div>
    </div>
    <div class="count" id="count">— / —</div>
  </div>
  <div class="controls">
    <div class="fams" id="fams"></div>
    <div class="row2">
      <div class="seg" id="bgseg">
        <button data-bg="all" class="on">전체</button>
        <button data-bg="light">라이트</button>
        <button data-bg="dark">다크</button>
      </div>
      <input class="search" id="q" placeholder="이름 · 무드 · 폰트 검색 (예: serif, photography, gold)">
    </div>
  </div>
</div></header>

<div class="wrap">
  <div class="grid" id="grid"></div>
  <p class="note" id="note"></p>
</div>
<div class="toast" id="toast"></div>

<script>
const FAM = {
  gallery:{ko:'갤러리',c:'--fam-gallery'},
  noir:{ko:'아틀리에 누아르',c:'--fam-noir'},
  editorial:{ko:'에디토리얼',c:'--fam-editorial'},
  studio:{ko:'스튜디오',c:'--fam-studio'},
  neotech:{ko:'네오 테크',c:'--fam-neotech'},
  warm:{ko:'웜 퍼스널',c:'--fam-warm'},
  lens:{ko:'렌즈',c:'--fam-lens'},
  corporate:{ko:'코퍼릿 클린',c:'--fam-corporate'},
};
const FAM_ORDER = ['gallery','noir','editorial','studio','neotech','warm','lens','corporate'];
let TPL = [], state = {fam:'all', bg:'all', q:''};
const LOCAL = ['localhost','127.0.0.1','[::1]'].includes(location.hostname);

function clean(name){
  return name
    .replace(/-20\d\d-\d\d-\d\d-\d\d-\d\d-\d\d-utc\.zip$/i,'')
    .replace(/\.zip$/i,'')
    .replace(/-(html5?|vue|react|nextjs|next|tailwind(-css)?|bootstrap( 5)?|flask|sketch|figma|psd)-?(template|portfolio)?/gi,'')
    .replace(/-(personal|creative|responsive|minimal|modern|one-page|comprehensive|clean)?-?(portfolio|resume|cv|template|website|agency)/gi,' ')
    .replace(/-/g,' ').replace(/\s+/g,' ').trim();
}
function slug(name){ return name.replace(/\.zip$/i,''); }

/* --- 템플릿 실측 팔레트 → 렌더러 토큰 (온라인 '이 무드로 미리보기') --- */
function _rgb(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function _hex(r,g,b){const c=v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0');return'#'+c(r)+c(g)+c(b);}
function _lum(h){const[r,g,b]=_rgb(h);return(0.2126*r+0.7152*g+0.0722*b)/255;}
function _mix(a,b,t){const A=_rgb(a),B=_rgb(b);return _hex(A[0]+(B[0]-A[0])*t,A[1]+(B[1]-A[1])*t,A[2]+(B[2]-A[2])*t);}
function _sat(h){const[r,g,b]=_rgb(h);const mx=Math.max(r,g,b),mn=Math.min(r,g,b);return mx===0?0:(mx-mn)/mx;}
function _chroma(h){const l=_lum(h);return _sat(h)*Math.min(1,l*2)*Math.min(1,(1-l)*2.2);}
function _hue(h){const[r,g,b]=_rgb(h);const mx=Math.max(r,g,b),mn=Math.min(r,g,b);if(mx===mn)return 0;const d=mx-mn;let H=mx===r?((g-b)/d+(g<b?6:0)):mx===g?((b-r)/d+2):((r-g)/d+4);return H*60;}
function _hueDist(a,b){let d=Math.abs(_hue(a)-_hue(b))%360;return d>180?360-d:d;}
const FAMTOK={
  gallery:{f:['Fraunces','Outfit'],l:{hero:'bigtype',nav:'top',work:'grid2',motion:'calm',rad:0,dens:1.12}},
  noir:{f:['Playfair Display','Outfit'],l:{hero:'bigtype',nav:'top',work:'grid3',motion:'calm',rad:8,dens:1.05}},
  editorial:{f:['Instrument Serif','Inter'],l:{hero:'bigtype',nav:'top',work:'grid2',motion:'calm',rad:0,dens:1}},
  studio:{f:['Space Grotesk','Space Grotesk'],l:{hero:'split',nav:'top',work:'mason',motion:'bold',rad:16,dens:.92}},
  neotech:{f:['Space Grotesk','Inter'],l:{hero:'bigtype',nav:'top',work:'grid3',motion:'calm',rad:3,dens:1}},
  warm:{f:['Manrope','Manrope'],l:{hero:'split',nav:'top',work:'grid2',motion:'calm',rad:22,dens:1}},
  lens:{f:['Inter','Inter'],l:{hero:'fullbleed',nav:'top',work:'mason',motion:'calm',rad:8,dens:1.08}},
  corporate:{f:['Archivo','Inter'],l:{hero:'bigtype',nav:'top',work:'grid3',motion:'calm',rad:10,dens:1}},
};
/* 이름 해시 → 결정론적 변주 (같은 템플릿=항상 같은, 서로는 다른 조합) */
function _hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
const SERIF_POOL=['Fraunces','Playfair Display','Instrument Serif','Lora','Cormorant Garamond','Marcellus','Prata'];
const SANS_POOL=['Space Grotesk','Archivo','Inter','Manrope','Outfit','Sora','Syne','DM Sans','Work Sans','Urbanist','Barlow'];
/* 한글 디스플레이 폰트 — 라틴 폰트는 한글 글리프가 없어 헤드라인이 전부 시스템 폰트로 폴백되던 문제의 해결책 */
const KR_SERIF=['Noto Serif KR','Nanum Myeongjo','Gowun Batang','Song Myung','Hahmlet'];
const KR_SANS=['Gothic A1','IBM Plex Sans KR','Black Han Sans','Do Hyeon','Gowun Dodum','Jua'];
const KR_BODY=['Noto Sans KR','IBM Plex Sans KR','Gothic A1'];
const PACK_KEYS=['design','pharma','medical','photo','archi','tech','data','mkt','edu','law','finance','fnb'];
function tplPreviewUrl(t){
  const pal=(t.palette||[]).filter(h=>/^#[0-9a-fA-F]{3}([0-9a-fA-F]{3})?$/.test(h));
  if(!pal.length) return null;
  const byL=[...pal].sort((a,b)=>_lum(a)-_lum(b)), dark=t.bg==='dark';
  let bg=dark?_mix(byL[0],'#05080a',.4):_mix(byL[byL.length-1],'#ffffff',.45);
  let ink=dark?_mix(byL[byL.length-1],'#ffffff',.35):_mix(byL[0],'#101112',.5);
  if(dark&&_lum(ink)<.7)ink=_mix(ink,'#fff',.5);
  if(!dark&&_lum(ink)>.35)ink=_mix(ink,'#111',.6);
  let acc=pal.reduce((m,c)=>_chroma(c)>_chroma(m)?c:m,pal[0]);
  if(_chroma(acc)<.06)acc=dark?'#C9A96A':'#A8823E';
  if(dark&&_lum(acc)<.35)acc=_mix(acc,'#fff',.3);
  const acc2=pal.filter(c=>c!==acc&&_chroma(c)>.1&&_hueDist(c,acc)>30).sort((a,b)=>_chroma(b)-_chroma(a))[0]||_mix(acc,dark?'#8ad':'#358',.55);
  const F=FAMTOK[t.family]||FAMTOK.gallery;
  const H=_hash(t.name);
  /* ① 폰트 — 실측 sans/serif/mixed 타입에 맞는 풀에서 해시로 선택 */
  let disp,body;
  if(t.font==='serif'){disp=SERIF_POOL[H%SERIF_POOL.length];body=['Outfit','Inter','Manrope'][(H>>>3)%3];}
  else if(t.font==='sans'){disp=SANS_POOL[H%SANS_POOL.length];body=SANS_POOL[(H>>>4)%SANS_POOL.length];}
  else{disp=(H&1)?SERIF_POOL[H%SERIF_POOL.length]:SANS_POOL[H%SANS_POOL.length];body=SANS_POOL[(H>>>4)%SANS_POOL.length];}
  /* 한글 페어: 라틴 디스플레이의 세리프 여부에 맞춰 한글 폰트 선택 — 한글 헤드라인이 실제로 달라지는 부분 */
  const dispKr=(SERIF_POOL.includes(disp)?KR_SERIF:KR_SANS)[(H>>>5)%(SERIF_POOL.includes(disp)?KR_SERIF.length:KR_SANS.length)];
  const bodyKr=KR_BODY[(H>>>9)%KR_BODY.length];
  /* ② 레이아웃 — 실측 layout/vibe 키워드 우선, 나머지는 해시 변주 */
  const kw=((t.layout||'')+' '+(t.vibe||'')).toLowerCase();
  const l={...F.l};
  if(/masonry/.test(kw))l.work='mason';
  else if(/slider|carousel/.test(kw))l.work='row';
  else if(/minimal/.test(kw))l.work='grid2';
  else l.work=['grid3','grid2','mason','row'][(H>>>6)%4];
  if(/fullscreen|full-screen|fullpage/.test(kw))l.hero='fullbleed';
  else if(/split/.test(kw))l.hero='split';
  else l.hero=[F.l.hero,'bigtype','split','fullbleed'][(H>>>8)%4];
  l.halign=l.hero!=='split'&&(H>>>27&3)===0?'center':'';   // 1/4 센터 히어로 (첫 화면 인상 변주)
  if(/bold|creative/.test(kw)&&(H>>>10&1))l.motion='bold';
  l.rad=Math.max(0,Math.min(24,(F.l.rad??10)+((H>>>11)%13-4)));
  l.dens=+(Math.max(.85,Math.min(1.2,(F.l.dens||1)+((H>>>13)%5-2)*.06))).toFixed(2);
  l.scale=[0.9,1,1.08,1.18][(H>>>15)%4];
  l.case=(SANS_POOL.includes(disp)&&(H>>>17&3)===0)?'upper':'';
  l.imgStart=(H>>>19)%6;
  l.aspect=['4/3','3/2','4/5'][(H>>>21)%3];
  l.flow=(H>>>23)%6;                                   // 섹션 구성 흐름 6종
  l.about=['','center','bar'][(H>>>26)%3];             // 소개 레이아웃 3변형
  if((H>>>29&7)===0)l.nav='side';                      // 1/8 확률 사이드 내비
  /* 페이지 아키타입 — 포맷 골격 자체. 실측 키워드 힌트 우선, 나머지 해시 */
  const nm=t.name.toLowerCase();
  if(/vcard|v-card/.test(kw+nm))l.arch='vcard';
  else if(/resume|\bcv\b/.test(kw)||/resume|(^|-)cv(-|$)/.test(nm))l.arch='cv';
  else if(t.family==='lens'&&(H>>>30&1))l.arch='wall';
  else if(/fullpage|full-screen|fullscreen/.test(kw)&&(H>>>30&1))l.arch='deck';
  else l.arch=['onepage','split','vcard','cv','wall','deck','onepage','split'][(H>>>12)%8];
  const tok={c:{bg,surf:_mix(bg,ink,dark?.09:.05),ink,mut:_mix(ink,bg,.42),line:dark?'rgba(255,255,255,.12)':'rgba(17,17,17,.13)',acc,acc2},
    f:{disp,body,dispKr,bodyKr},l,
    p:{ind:PACK_KEYS[(H>>>2)%PACK_KEYS.length]},   /* 샘플 페르소나도 로테이션 — 카피·사진·프로젝트가 통째로 달라짐 */
    m:{fam:clean(t.name),famko:'',pal:(FAM[t.family]?.ko||t.family)+' 무드',k:t.family}};
  return 'preview.html#'+encodeURIComponent(JSON.stringify(tok));
}

function render(){
  const g = document.getElementById('grid');
  const q = state.q.toLowerCase();
  let list = TPL.filter(t=>{
    if(state.fam!=='all' && t.family!==state.fam) return false;
    if(state.bg!=='all' && t.bg!==state.bg) return false;
    if(q){
      const hay = (t.name+' '+(t.vibe||'')+' '+(t.font||'')+' '+(t.layout||'')+' '+(t.family||'')+' '+(t.note||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  list.sort((a,b)=> FAM_ORDER.indexOf(a.family)-FAM_ORDER.indexOf(b.family) || clean(a.name).localeCompare(clean(b.name)));
  document.getElementById('count').innerHTML = `<b>${list.length}</b> / ${TPL.length}`;
  if(!list.length){ g.innerHTML='<div class="empty">조건에 맞는 템플릿이 없어요.</div>'; return; }
  g.innerHTML = list.map(t=>{
    const f = FAM[t.family]||{ko:t.family,c:'--ink2'};
    const col = `var(${f.c})`;
    const pal = (t.palette||[]).slice(0,5).map(h=>`<span style="background:${h}" data-hex="${h}" title="${h}"></span>`).join('');
    const pv = tplPreviewUrl(t);
    const demo = (pv?`<a class="demo" href="${pv}" target="_blank" rel="noopener" title="이 템플릿의 실측 색·무드를 우리 렌더러에 입혀 미리보기">이 무드로 미리보기 ↗</a>`:'')
      + (LOCAL ? ` <a class="demo" href="demo?z=${encodeURIComponent(t.name)}" target="_blank" rel="noopener">원본 데모 ↗</a>` : '');
    const conf = (t.confidence||'med').toLowerCase();
    return `<div class="card has-shot">
      <img class="shot" src="assets/shots/${slug(t.name)}.jpg" alt="" loading="lazy"
        onerror="this.remove();this.closest('.card').classList.remove('has-shot')">
      <div class="pal">${pal}</div>
      <div class="cbody">
        <div class="ctop">
          <div class="name">${clean(t.name)}</div>
          <div class="fam" style="color:${col};border-color:${col}">${f.ko}</div>
        </div>
        <div class="meta">
          <span class="tag bg-${t.bg}">${t.bg==='dark'?'다크':'라이트'}</span>
          <span class="tag">${t.font||'sans'}</span>
          ${t.tech?`<span class="tag">${t.tech.replace('html-','').replace('html','static')}</span>`:''}
        </div>
        ${t.vibe?`<div class="vibe">"${t.vibe}"</div>`:''}
        ${t.layout?`<div class="layout">${t.layout}</div>`:''}
        <div class="cfoot">
          ${demo}
          <span class="conf ${conf}"><i></i>${conf}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function buildFams(){
  const counts = {}; TPL.forEach(t=>counts[t.family]=(counts[t.family]||0)+1);
  const el = document.getElementById('fams');
  const all = `<button class="chip on" data-fam="all">전체 <span class="n">${TPL.length}</span></button>`;
  const rest = FAM_ORDER.filter(f=>counts[f]).map(f=>{
    const info = FAM[f];
    return `<button class="chip" data-fam="${f}"><span class="dot" style="color:var(${info.c})"></span>${info.ko} <span class="n">${counts[f]}</span></button>`;
  }).join('');
  el.innerHTML = all+rest;
  el.onclick = e=>{ const b=e.target.closest('.chip'); if(!b)return;
    [...el.children].forEach(c=>c.classList.remove('on')); b.classList.add('on');
    state.fam=b.dataset.fam; render(); };
}

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1100); }

document.getElementById('bgseg').onclick = e=>{ const b=e.target.closest('button'); if(!b)return;
  [...e.currentTarget.children].forEach(c=>c.classList.remove('on')); b.classList.add('on');
  state.bg=b.dataset.bg; render(); };
document.getElementById('q').oninput = e=>{ state.q=e.target.value; render(); };
document.getElementById('grid').addEventListener('click', e=>{
  const s=e.target.closest('.pal span'); if(s&&s.dataset.hex){ navigator.clipboard?.writeText(s.dataset.hex); toast(s.dataset.hex+' 복사됨'); }
});

fetch('template-classification.json').then(r=>r.json()).then(data=>{
  const root = (data&&data.templates)?data:(data&&data.result)?data.result:{templates:[]};
  TPL = root.templates||[];
  const q = new URLSearchParams(location.search);
  if(q.get('fam')&&FAM[q.get('fam')]) state.fam=q.get('fam');
  if(q.get('q')){ state.q=q.get('q'); const qi=document.getElementById('q'); if(qi) qi.value=state.q; }
  buildFams();
  if(state.fam!=='all'){ const b=document.querySelector(`.chip[data-fam="${state.fam}"]`); if(b){document.querySelector('.chip.on')?.classList.remove('on');b.classList.add('on');} }
  render();
  document.getElementById('note').innerHTML =
    `카드 상단 이미지는 각 템플릿을 <b>실제로 렌더링해 캡처한 원본 스크린샷</b>이에요. 분류 근거: 각 템플릿의 CSS·HTML을 열어 실제 배경·팔레트·폰트·레이아웃을 읽고 8개 디자인 패밀리로 나눴어요 (전수 115개). 팔레트 색을 클릭하면 hex가 복사돼요. `
    + `'이 무드로 미리보기'는 각 템플릿의 실측 색·무드를 우리 렌더러에 입혀 <b>실제 포트폴리오 페이지로</b> 보여줘요.`
    + (LOCAL ? ` '원본 데모'는 로컬에서 zip을 풀어 띄웁니다.` : ` (상용 원본 데모는 로컬 <code>python3 serve.py</code> 전용)`)
    + ` · <a href="design-quiz.html">취향 진단으로 방향 찾기 →</a>`;
});
</script>
