<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>디자인 취향 진단 · Career Atelier</title>
<!--
  Career Atelier "05 디자인 컨셉" 도구 v1.
  취향(영화·음악·무드) 10문답 → 6개 디자인 축 점수 → 8개 디자인 시스템 패밀리로 역산.
  각 패밀리에 Drive의 포트폴리오 템플릿 라이브러리(130+)를 이름 기준으로 매칭(휴리스틱, 프리뷰 후 정교화 가능).
  질문·가중치·패밀리는 전부 아래 JS 데이터에서 수정.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F1EBDF; --panel:#FBF7EF; --panel2:#F3ECDF; --ink:#2A2620; --ink2:#3A352C;
  --muted:#867C6E; --faint:#A99E8D; --gold:#A8823E; --gold2:#C9A96A;
  --line:rgba(42,38,32,.14); --line2:rgba(42,38,32,.24); --ease:cubic-bezier(.19,1,.22,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:"Outfit",-apple-system,"Apple SD Gothic Neo",sans-serif;
  font-weight:400;line-height:1.6;min-height:100vh;word-break:keep-all;overflow-wrap:break-word;}
.serif{font-family:"Fraunces",Georgia,serif;}
button{font-family:inherit;cursor:pointer;color:inherit;background:none;border:0;}
.wrap{max-width:820px;margin:0 auto;padding:clamp(28px,6vw,64px) clamp(20px,5vw,40px);min-height:100vh;display:flex;flex-direction:column;justify-content:center;}
.kicker{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:11px;justify-content:center;}
.kicker::before,.kicker::after{content:"";width:24px;height:1px;background:var(--gold);opacity:.6;}

/* intro */
.intro{text-align:center;}
.intro h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(34px,6vw,62px);line-height:1.08;letter-spacing:-.02em;margin:22px 0 0;}
.intro h1 em{font-style:italic;color:var(--gold);}
.intro p{margin:22px auto 0;max-width:44ch;color:var(--muted);font-weight:300;font-size:clamp(15px,1.6vw,18px);}
.btn{display:inline-flex;align-items:center;gap:10px;font-size:15px;font-weight:600;padding:15px 30px;border-radius:100px;background:var(--gold);color:#FBF7EF;transition:background .25s,transform .15s;}
.btn:hover{background:var(--ink);}.btn:active{transform:scale(.97);}
.btn.ghost{background:none;border:1px solid var(--line2);color:var(--ink);}
.btn.ghost:hover{border-color:var(--gold);color:var(--gold);}
.intro .btn{margin-top:38px;}

/* progress */
.prog{display:flex;gap:6px;justify-content:center;margin-bottom:36px;}
.prog i{width:26px;height:3px;border-radius:3px;background:var(--line);transition:background .3s;}
.prog i.done{background:var(--gold);}
.prog i.cur{background:var(--ink);}

/* question */
.q .qn{text-align:center;font-size:12.5px;letter-spacing:.1em;color:var(--faint);font-weight:500;}
.q h2{text-align:center;font-family:"Fraunces",serif;font-weight:400;font-size:clamp(23px,3.4vw,36px);line-height:1.25;letter-spacing:-.01em;margin:12px auto 34px;max-width:20ch;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.opt{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:clamp(22px,3vw,34px) clamp(18px,2.5vw,26px);text-align:left;transition:border-color .2s,transform .12s,box-shadow .25s;min-height:150px;display:flex;flex-direction:column;}
.opt:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 22px 40px -26px rgba(42,38,32,.4);}
.opt:active{transform:translateY(-1px);}
.opt .oa{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;}
.opt .ot{font-family:"Fraunces",serif;font-size:clamp(19px,2.4vw,26px);font-weight:600;letter-spacing:-.01em;margin-top:10px;line-height:1.15;}
.opt .os{margin-top:10px;font-size:13.5px;color:var(--muted);font-weight:300;flex:1;}
.vs{position:absolute;left:50%;top:calc(50% + 8px);transform:translate(-50%,-50%);font-family:"Fraunces",serif;font-style:italic;font-size:15px;color:var(--faint);background:var(--bg);padding:5px 8px;border-radius:50%;pointer-events:none;}
.opts-wrap{position:relative;}
@media(max-width:600px){.opts{grid-template-columns:1fr;gap:12px;}.opt{min-height:0;}.vs{display:none;}}

/* result */
.res{text-align:center;}
.res .fam{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(34px,6.5vw,66px);line-height:1.05;letter-spacing:-.02em;margin-top:10px;}
.res .famko{color:var(--gold);font-size:.5em;font-style:italic;display:block;margin-top:6px;}
.res .blurb{margin:20px auto 0;max-width:48ch;color:var(--ink2);font-weight:300;font-size:clamp(15px,1.7vw,19px);}
.pallab{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:600;margin:34px 0 14px;}
.palgal{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 12px;scroll-snap-type:x proximity;}
.palcard{flex:0 0 auto;border:1px solid var(--line);border-radius:12px;padding:9px;background:var(--panel);transition:border-color .2s,transform .12s,box-shadow .2s;scroll-snap-align:start;}
.palcard:hover{transform:translateY(-3px);}
.palcard.on{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold2);}
.palcard .sw{display:flex;border-radius:7px;overflow:hidden;width:128px;height:38px;border:1px solid var(--line);}
.palcard .sw i{flex:1;display:block;}
.palcard .pn{display:block;font-size:11.5px;color:var(--muted);margin-top:8px;text-align:center;white-space:nowrap;}
.palcard .pn b{color:#FBF7EF;background:var(--gold);font-weight:600;font-size:9.5px;padding:2px 7px;border-radius:100px;margin-left:5px;letter-spacing:.04em;}
.palsel{margin:6px auto 0;max-width:480px;background:var(--panel);border:1px solid var(--line2);border-radius:14px;padding:16px 18px;}
.palsel .psw{display:flex;height:48px;border-radius:9px;overflow:hidden;border:1px solid var(--line);}
.palsel .psw i{flex:1;display:block;}
.palsel .pmeta{margin-top:13px;font-size:13.5px;color:var(--ink2);}
.palsel .pmeta b{font-weight:600;}
.palsel .pcodes{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;justify-content:center;}
.palsel .pcodes span{font-size:10.5px;color:var(--muted);border:1px solid var(--line);border-radius:100px;padding:3px 10px;background:var(--bg);}
.typ{margin:26px auto 0;padding:22px;background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:460px;}
.typ .big{font-size:clamp(24px,4vw,34px);letter-spacing:-.01em;}
.typ .small{margin-top:6px;font-size:13px;color:var(--muted);}
.typ .lab{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:12px;}
.axes{max-width:460px;margin:30px auto 0;text-align:left;}
.axrow{display:grid;grid-template-columns:70px 1fr 70px;gap:10px;align-items:center;margin:9px 0;font-size:11.5px;color:var(--muted);}
.axrow .bar{height:6px;background:var(--panel2);border-radius:6px;position:relative;border:1px solid var(--line);}
.axrow .bar i{position:absolute;top:-3px;width:12px;height:12px;border-radius:50%;background:var(--gold);transform:translateX(-50%);box-shadow:0 0 0 3px var(--bg);}
.axrow .r{text-align:right;}
.tmpl{margin:30px auto 0;max-width:520px;}
.tmpl .lab{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:14px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.chip{font-size:12px;color:var(--ink2);border:1px solid var(--line2);border-radius:100px;padding:6px 13px;background:var(--panel);}
.res .also{margin-top:24px;font-size:13px;color:var(--faint);}
.res .also b{color:var(--muted);font-weight:500;}
.res-cta{margin-top:38px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.note{margin-top:34px;font-size:11.5px;color:var(--faint);line-height:1.6;border-top:1px solid var(--line);padding-top:16px;}
.hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <!-- INTRO -->
  <section id="intro" class="intro">
    <div class="kicker">Career Atelier · 디자인 컨셉</div>
    <h1>당신의 <em>취향</em>으로<br>디자인을 짓습니다</h1>
    <p>색이나 폰트를 묻지 않아요. 좋아하는 영화·음악·무드 열 가지만 고르면, 당신에게 맞는 디자인 시스템을 찾아드려요.</p>
    <button class="btn" id="start">시작하기 (10문항) →</button>
  </section>

  <!-- QUESTION -->
  <section id="quiz" class="q hidden">
    <div class="prog" id="prog"></div>
    <div class="qn" id="qn"></div>
    <h2 id="qtext"></h2>
    <div class="opts-wrap">
      <div class="opts">
        <button class="opt" id="optA"></button>
        <button class="opt" id="optB"></button>
      </div>
      <span class="vs serif">vs</span>
    </div>
  </section>

  <!-- RESULT -->
  <section id="result" class="res hidden">
    <div class="kicker">당신의 디자인 시스템</div>
    <div class="fam serif" id="famName"></div>
    <p class="blurb" id="famBlurb"></p>
    <div class="pallab">시작 팔레트 · 취향에 맞춰 정렬 (전부 실제 Pantone)</div>
    <div class="palgal" id="palgal"></div>
    <div class="palsel" id="palsel"></div>
    <div class="typ">
      <div class="lab">타이포그래피</div>
      <div class="big serif" id="typBig">Career Atelier</div>
      <div class="small" id="typSmall"></div>
    </div>
    <div class="axes" id="axes"></div>
    <div class="tmpl">
      <div class="lab">이 방향에 맞는 라이브러리 템플릿</div>
      <div class="chips" id="tmplChips"></div>
    </div>
    <div class="also" id="also"></div>
    <div class="res-cta">
      <button class="btn" id="again">다시 진단</button>
      <button class="btn ghost" id="share">결과 요약 복사</button>
    </div>
    <p class="note">v1 — 취향→디자인 축 매핑은 튜닝 가능하고, 템플릿 매칭은 이름 기준 휴리스틱이라 실제 프리뷰로 정교화합니다.</p>
  </section>
</div>

<script>

const AXES=[

                        B:{oa:'B',t:'크리스토퍼 놀란',s:'차갑고 웅장하고 진지하게',w:{mood:-1,temp:-1,energy:-1}}},
 {q:'플레이리스트는', A:{oa:'A',t:'쳇 베이커',s:'나른한 재즈 발라드',w:{energy:1,temp:1,era:1}},
                       B:{oa:'B',t:'다프트 펑크',s:'미래적인 일렉트로',w:{energy:-1,era:-1,temp:-1}}},

                      B:{oa:'B',t:'페스티벌과 클럽',s:'가득 찬 에너지 속에서',w:{density:-1,energy:-1,mood:-1}}},
 {q:'머물고 싶은 곳', A:{oa:'A',t:'교토의 료칸',s:'자연 소재와 시간이 쌓인 결',w:{temp:1,era:1,density:.5}},
                       B:{oa:'B',t:'뉴욕의 로프트',s:'노출 콘크리트와 도시의 선',w:{temp:-1,type:-1,era:-.5}}},
 {q:'사진의 감성은', A:{oa:'A',t:'흑백 필름',s:'담백하고 오래가는',w:{density:1,era:1,type:.5}},

 {q:'글씨의 취향은', A:{oa:'A',t:'만년필 손편지',s:'획의 온기가 남는',w:{type:1,temp:1,era:1}},
                      B:{oa:'B',t:'네온 사인',s:'또렷하고 현대적인',w:{type:-1,energy:-1,era:-1}}},
 {q:'옷장을 연다면', A:{oa:'A',t:'톤온톤 베이지 니트',s:'조용한 한 색으로',w:{density:1,temp:1,energy:1}},
                      B:{oa:'B',t:'레드 컬러 블로킹',s:'대담한 대비로',w:{density:-1,energy:-1,mood:.3}}},
 {q:'하루 중 이 순간', A:{oa:'A',t:'이른 아침의 미색 햇살',s:'밝고 부드러운',w:{mood:1,temp:1,energy:1}},
                        B:{oa:'B',t:'자정의 네온 도시',s:'어둡고 선명한',w:{mood:-1,temp:-1,era:-1}}},
 {q:'벽을 채운다면', A:{oa:'A',t:'여백이 �upsD 갤러리 벽',s:'한 점만 걸어두고',w:{density:1,energy:1,type:.5}},
                      B:{oa:'B',t:'가득 채운 콜라주',s:'겹치고 쌓아서',w:{density:-1,energy:-1}}},
 {q:'끌리는 팔레트', A:{oa:'A',t:'크림 · 아이보리 · 골드',s:'따뜻하고 우아하게',w:{mood:1,temp:1,era:1}},
                      B:{oa:'B',t:'블랙 · 실버 · 일렉트릭',s:'차갑고 미래적으로',w:{mood:-1,temp:-1,era:-1}}},
];
// fix a typo-safe label
Q[8].A.t='여백이 많은 갤러리 벽';

/* ---------- diverse Pantone palette library (16) ---------- */
const PAL=[{id:"warm-neutral",en:"Ivory & Gold",ko:"아이보리 골드",m:["bright", "warm", "calm"],c:[["#F1EBDF","7422 C"],["#FBF7EF","7422 C"],["#C9A96A","7407 C"],["#A8823E","7511 C"],["#2A2620","Black 4 C"]]},
{id:"mono",en:"Ink Monotone",ko:"잉크 모노톤",m:["dark", "cool", "calm"],c:[["#0B0D10","Black 6 C"],["#2A2F36","Black C"],["#5B6470","Cool Gray 10 C"],["#9AA3B0","Cool Gray 6 C"],["#E6EAF0","7541 C"]]},
{id:"mono-warm",en:"Sepia Monotone",ko:"세피아 모노톤",m:["warm", "calm"],c:[["#2A1B10","Black 4 C"],["#6B4A2E","7518 C"],["#A8823E","7511 C"],["#D8B87A","7502 C"],["#F3E6CE","7422 C"]]},
{id:"bw",en:"Black & White",ko:"흑백",m:["bright", "calm", "bold"],c:[["#111111","Black 6 C"],["#4A4A4A","7533 C"],["#9B9B9B","Cool Gray 7 C"],["#DDDDDD","Cool Gray 1 C"],["#FFFFFF","7422 C"]]},
{id:"neon",en:"Neon on Black",ko:"네온 온 블랙",m:["dark", "bold", "experimental"],c:[["#0A0A0F","Black 6 C"],["#13131A","Black 6 C"],["#39FF14","361 C"],["#FF10F0","Rhodamine Red C"],["#00E5FF","306 C"]]},
{id:"neon-cyber",en:"Cyber Sunset",ko:"사이버 선셋",m:["dark", "bold", "experimental"],c:[["#0D0221","Black 6 C"],["#241734","7547 C"],["#F72585","218 C"],["#7209B7","266 C"],["#4CC9F0","319 C"]]},

{id:"sage",en:"Forest Sage",ko:"포레스트 세이지",m:["bright", "calm", "warm"],c:[["#F3F1E9","7422 C"],["#A3B18A","7494 C"],["#588157","4485 C"],["#3A5A40","7483 C"],["#344E41","350 C"]]},
{id:"noir-gold",en:"Champagne Noir",ko:"샴페인 누아르",m:["dark", "warm", "calm"],c:[["#0A0E0F","Black 6 C"],["#12191C","Black 6 C"],["#E6B15E","7508 C"],["#57B7C1","7472 C"],["#ECEFEC","7541 C"]]},

function palFit(p,v){let s=0,m=p.m;
  if(m.includes('bright'))s+=v.mood; if(m.includes('dark'))s-=v.mood;
  if(m.includes('warm'))s+=v.temp; if(m.includes('cool'))s-=v.temp;
  if(m.includes('calm'))s+=v.energy; if(m.includes('bold'))s-=v.energy;
  if(m.includes('experimental'))s-=v.era; return s;}

/* ---------- 8 design-system families (coords on the 6 axes, -1..1) ---------- */
const FAM=[
 {name:'The Gallery',ko:'갤러리',c:{mood:1,density:1,type:1,temp:1,energy:1,era:1},

/* ---------- engine ---------- */
let cur=0; const score={}; AXES.forEach(a=>score[a.k]=0);
const maxAbs={}; AXES.forEach(a=>maxAbs[a.k]=0);
Q.forEach(q=>{const m={};[q.A.w,q.B.w].forEach(w=>{for(const k in w)m[k]=Math.max(m[k]||0,Math.abs(w[k]));});for(const k in m)maxAbs[k]+=m[k];});

const $=s=>document.querySelector(s);
function show(id){['intro','quiz','result'].forEach(x=>$('#'+x).classList.toggle('hidden',x!==id));}
function renderProg(){$('#prog').innerHTML=Q.map((_,i)=>`<i class="${i<cur?'done':i===cur?'cur':''}"></i>`).join('');}
function renderQ(){
  renderProg();
  const q=Q[cur];
  $('#qn').textContent=`Q${cur+1} / ${Q.length}`;
  $('#qtext').textContent=q.q;
  for(const [id,o] of [['#optA',q.A],['#optB',q.B]]){
    $(id).innerHTML=`<span class="oa">${o.oa}</span><span class="ot serif">${o.t}</span><span class="os">${o.s}</span>`;
  }
}
function pick(o){for(const k in o.w)score[k]+=o.w[k];cur++;if(cur<Q.length)renderQ();else renderResult();}

function nearest(){
  // normalize user vector to [-1,1] per axis
  const v={};AXES.forEach(a=>v[a.k]=maxAbs[a.k]?score[a.k]/maxAbs[a.k]:0);
  let best=null,bd=1e9,second=null,sd=1e9;
  FAM.forEach(f=>{let d=0;AXES.forEach(a=>{const x=v[a.k]-(f.c[a.k]||0);d+=x*x;});
    if(d<bd){sd=bd;second=best;bd=d;best=f;}else if(d<sd){sd=d;second=f;}});
  return {best,second,v};
}
let RESULT=null;
function renderResult(){
  show('result');
  const {best,second,v}=nearest();RESULT={best,second};
  $('#famName').innerHTML=`${best.name}<span class="famko">${best.ko}</span>`;
  $('#famBlurb').textContent=best.blurb;
  const ranked=[...PAL].sort((a,b)=>palFit(b,v)-palFit(a,v));
  $('#palgal').innerHTML=ranked.map((p,i)=>`<button class="palcard" data-pid="${p.id}">
    <span class="sw">${p.c.map(c=>`<i style="background:${c[0]}"></i>`).join('')}</span>
    <span class="pn">${p.ko}${i===0?' <b>추천</b>':''}</span></button>`).join('');
  $('#palgal').querySelectorAll('.palcard').forEach(b=>b.onclick=()=>selectPal(b.dataset.pid));
  selectPal(ranked[0].id);
  $('#typBig').style.fontFamily=best.type.includes('세리프')||best.type.includes('디스플레이')?'"Fraunces",serif':'"Outfit",sans-serif';
  $('#typSmall').textContent=best.type;
  $('#axes').innerHTML=AXES.map(a=>{const p=(v[a.k]+1)/2*100;
    return `<div class="axrow"><span>${a.neg}</span><span class="bar"><i style="left:${p}%"></i></span><span class="r">${a.pos}</span></div>`;}).join('');
  $('#tmplChips').innerHTML=best.t.map(t=>`<span class="chip">${t}</span>`).join('');
  $('#also').innerHTML=`두 번째로 가까운 방향: <b>${second.name} · ${second.ko}</b>`;
}

let SELPAL=null;
function selectPal(id){const p=PAL.find(x=>x.id===id);SELPAL=p;
  $('#palgal').querySelectorAll('.palcard').forEach(b=>b.classList.toggle('on',b.dataset.pid===id));
  $('#palsel').innerHTML=`<div class="psw">${p.c.map(c=>`<i style="background:${c[0]}"></i>`).join('')}</div>
    <div class="pmeta"><b>${p.en}</b> · ${p.ko}<div class="pcodes">${p.c.map(c=>`<span>Pantone ${c[1]}</span>`).join('')}</div></div>`;}

$('#start').onclick=()=>{show('quiz');renderQ();};
$('#optA').onclick=()=>pick(Q[cur].A);
$('#optB').onclick=()=>pick(Q[cur].B);
$('#again').onclick=()=>{cur=0;AXES.forEach(a=>score[a.k]=0);show('intro');};
$('#share').onclick=()=>{if(!RESULT)return;const t=`[Career Atelier 디자인 진단] ${RESULT.best.name}(${RESULT.best.ko}) · 팔레트: ${SELPAL?SELPAL.ko+' ['+SELPAL.c.map(c=>c[1]).join(', ')+']':''}`;
  navigator.clipboard.writeText(t).then(()=>{$('#share').textContent='복사됨 ✓';setTimeout(()=>$('#share').textContent='결과 요약 복사',1500);});};
</script>
